name: Deploy to GCS
true:
  push:
    branches:
    - main
permissions:
  contents: read
  id-token: write
jobs:
  build-and-deploy:
    runs-on:
    - self-hosted
    - gcp-deploy
    timeout-minutes: 5
    env:
      BUCKET: boot-41-frontend
      USER: ${{ secrets.USER }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: '9'
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        cache-dependency-path: client/pnpm-lock.y*ml
    - name: Validate USER secret
      run: "if [ -z \"${USER}\" ]; then\n  echo \"ERROR: USER secret is not set.\"\
        \n  exit 1\nfi\n"
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: client
    - name: Build
      run: pnpm run build
      working-directory: client
    - name: Auth to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
    - name: Clear existing test files
      run: gsutil -m rm -r gs://${{ env.BUCKET }}/${{ env.USER }}/** || true
    - name: Sync to GCS
      run: gsutil -m rsync -r client/dist gs://${{ env.BUCKET }}/${{ env.USER }}
    - name: Disable GCS cache
      run: gsutil -m setmeta -h "Cache-Control:no-cache, no-store, must-revalidate"
        gs://${{ env.BUCKET }}/${{ env.USER }}/**
'on':
  workflow_dispatch: {}
